<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZAZIE MOVIEDL - SESSION</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      :root {
        --bg-dark: #0a0a0c;
        --card-bg: #141418;
        --primary-blue: #007bff;
        --neon-blue: #00d4ff;
        --text-white: #ffffff;
        --text-dim: #a0a0a0;
        --accent-glow: rgba(0, 212, 255, 0.2);
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg-dark);
        background-image: radial-gradient(circle at 50% -20%, #003a5f 0%, #0a0a0c 80%);
        color: var(--text-white);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }

      .container {
        width: 100%;
        max-width: 420px;
        background: var(--card-bg);
        border-radius: 24px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                    0 0 20px rgba(0, 123, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
        backdrop-filter: blur(10px);
        transform: translateY(0);
        transition: var(--transition);
      }

      .container:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                    0 0 30px rgba(0, 212, 255, 0.15);
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 15px;
        background: linear-gradient(135deg, var(--primary-blue), var(--neon-blue));
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 35px;
        color: white;
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 1px;
        background: linear-gradient(to right, #fff, var(--neon-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 5px;
      }

      .subtitle {
        font-size: 14px;
        color: var(--text-dim);
        font-weight: 300;
      }

      /* Typing Animation Style */
      .typing-container {
        margin-top: 15px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 16px;
        font-weight: bold;
        color: var(--neon-blue);
        min-height: 20px;
      }

      .typing-text::after {
        content: "|";
        animation: blink 0.7s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      /* Toggle Switch */
      .toggle-container {
        display: flex;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 15px;
        padding: 5px;
        margin-bottom: 25px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .toggle-option {
        flex: 1;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .toggle-option.active {
        background: var(--primary-blue);
        color: white;
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
      }

      .input-group {
        margin-bottom: 20px;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .input-label {
        display: block;
        margin-bottom: 10px;
        font-size: 13px;
        color: var(--text-dim);
        padding-left: 5px;
      }

      .input-field {
        width: 100%;
        padding: 15px;
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        background: rgba(0, 0, 0, 0.2);
        color: white;
        font-size: 16px;
        transition: var(--transition);
      }

      .input-field:focus {
        outline: none;
        border-color: var(--neon-blue);
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 15px var(--accent-glow);
      }

      .generate-btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(to right, var(--primary-blue), var(--neon-blue));
        border: none;
        border-radius: 15px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .generate-btn:hover {
        transform: scale(1.02);
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
      }

      .code-display {
        background: rgba(0, 212, 255, 0.05);
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
        border: 1px dashed var(--primary-blue);
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--neon-blue);
      }

      .qr-display {
        background: white;
        padding: 15px;
        border-radius: 20px;
        text-align: center;
        margin-bottom: 20px;
        display: none;
        animation: scaleIn 0.5s ease-out;
      }

      @keyframes scaleIn {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .qr-image {
        width: 100%;
        max-width: 250px;
        border-radius: 10px;
      }

      .qr-instructions {
        color: #333;
        font-size: 13px;
        margin-top: 10px;
        font-weight: 500;
      }

      .copy-btn {
        width: 100%;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: var(--text-white);
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: var(--transition);
      }

      .copy-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--neon-blue);
      }

      .loading i {
        font-size: 30px;
        color: var(--neon-blue);
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }

      .footer {
        text-align: center;
        margin-top: 25px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .success-message { color: var(--neon-blue); }
      .error-message { color: #ff4b2b; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo"><i class="fas fa-play"></i></div>
        <h1 class="title">ZAZIE MOVIEDL</h1>
        <p class="subtitle">Secure Device Connection Panel</p>
        
        <div class="typing-container">
          <span id="typingText" class="typing-text"></span>
        </div>
      </div>

      <div class="toggle-container">
        <div class="toggle-option active" data-mode="pair">
          <i class="fas fa-terminal"></i> PAIRING
        </div>
        <div class="toggle-option" data-mode="qr">
          <i class="fas fa-qrcode"></i> QR SCAN
        </div>
      </div>

      <div class="input-group" id="inputGroup">
        <label class="input-label">WhatsApp Number (Ex: +9477...)</label>
        <input
          type="text"
          id="mobileNumber"
          class="input-field"
          placeholder="+947XXXXXXXX"
        />
      </div>

      <button class="generate-btn" id="submit">
        Get Link Code
      </button>

      <div class="loading hidden" id="loading" style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-circle-notch"></i>
      </div>

      <div class="code-display" id="codeDisplay">
        Ready for connection...
      </div>

      <div class="qr-display" id="qrDisplay">
        <img id="qrImage" class="qr-image" src="" alt="QR Code" />
        <div class="qr-instructions" id="qrInstructions">
          Open WhatsApp > Linked Devices > Scan QR
        </div>
      </div>

      <button class="copy-btn" id="copy" onclick="copyCode()">
        <i class="fas fa-copy"></i> COPY SESSION CODE
      </button>

      <div class="footer">
        <p>© 2026 ZAZIE MOVIEDL. ALL RIGHTS RESERVED.</p>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
    <script>
      // Auto Typing Logic
      const text = "Developed by NBT.";
      let index = 0;
      function type() {
        if (index < text.length) {
          document.getElementById("typingText").innerHTML += text.charAt(index);
          index++;
          setTimeout(type, 150);
        } else {
            setTimeout(() => {
                document.getElementById("typingText").innerHTML = "";
                index = 0;
                type();
            }, 3000); // Wait 3 seconds before restarting
        }
      }
      window.onload = type;

      let currentMode = "pair";

      document.querySelectorAll(".toggle-option").forEach((option) => {
        option.addEventListener("click", function () {
          const mode = this.dataset.mode;
          if (mode === currentMode) return;

          document.querySelectorAll(".toggle-option").forEach((opt) => opt.classList.remove("active"));
          this.classList.add("active");
          currentMode = mode;

          const submitBtn = document.getElementById("submit");
          const inputGroup = document.getElementById("inputGroup");
          const codeDisplay = document.getElementById("codeDisplay");
          const qrDisplay = document.getElementById("qrDisplay");

          if (mode === "pair") {
            submitBtn.classList.remove("hidden");
            inputGroup.classList.remove("hidden");
            qrDisplay.style.display = "none";
            codeDisplay.style.display = "flex";
            codeDisplay.innerHTML = "Ready for connection...";
          } else {
            submitBtn.classList.add("hidden");
            inputGroup.classList.add("hidden");
            generateQRCode();
          }
        });
      });

      async function generateQRCode() {
        const codeDisplay = document.getElementById("codeDisplay");
        const qrDisplay = document.getElementById("qrDisplay");
        const loading = document.getElementById("loading");

        loading.classList.remove("hidden");
        codeDisplay.style.display = "none";
        qrDisplay.style.display = "none";

        try {
          const response = await axios("/qr");
          if (response.data.qr) {
            document.getElementById("qrImage").src = response.data.qr;
            qrDisplay.style.display = "block";
          } else {
            codeDisplay.style.display = "flex";
            codeDisplay.innerHTML = '<div class="error-message">Failed to load QR</div>';
          }
        } catch (error) {
          codeDisplay.style.display = "flex";
          codeDisplay.innerHTML = '<div class="error-message">Server Error</div>';
        } finally {
          loading.classList.add("hidden");
        }
      }

      document.getElementById("submit").addEventListener("click", async () => {
        const number = document.getElementById("mobileNumber").value.trim();
        const codeDisplay = document.getElementById("codeDisplay");
        const loading = document.getElementById("loading");

        if (!number) {
          codeDisplay.innerHTML = '<span class="error-message">Enter number first!</span>';
          return;
        }

        loading.classList.remove("hidden");
        codeDisplay.innerHTML = "Generating...";

        try {
          const response = await axios(`/pair?number=${number.replace(/[^0-9]/g, "")}`);
          const code = response.data.code || "Error";
          codeDisplay.innerHTML = `<span class="success-message">CODE: ${code}</span>`;
        } catch (error) {
          codeDisplay.innerHTML = '<span class="error-message">Generation Failed</span>';
        } finally {
          loading.classList.add("hidden");
        }
      });

      function copyCode() {
        const textDisplay = document.getElementById("codeDisplay").innerText.replace("CODE: ", "");
        if(textDisplay === "Ready for connection...") return;
        
        navigator.clipboard.writeText(textDisplay).then(() => {
          const btn = document.getElementById("copy");
          const old = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
          setTimeout(() => btn.innerHTML = old, 2000);
        });
      }
    </script>
  </body>
</html>
